# =============================================
# DMP SERVICE - APPLICATION CONFIGURATION
# =============================================

# Application name (used by Kafka and service discovery)
spring.application.name=dmp-service

# Server port (each microservice runs on a different port)
server.port=8083

# =============================================
# MONGODB CONFIGURATION
# =============================================
# Replace 'localhost' with your MongoDB server address if needed
spring.data.mongodb.uri=mongodb://localhost:27017/mediconnect_dmp
spring.data.mongodb.database=mediconnect_dmp

# =============================================
# KAFKA CONFIGURATION
# =============================================
spring.kafka.bootstrap-servers=localhost:9092

# Producer settings (for publishing events)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000

# Consumer settings (for listening to events)
spring.kafka.consumer.group-id=dmp-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Eureka Client Config
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =============================================
# LOGGING
# =============================================
logging.level.com.mediconnect.dmp=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
