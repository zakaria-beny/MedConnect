

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  # MongoDB for all services
  mongodb:
    image: mongo:7.0
    container_name: medconnect-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: medconnect
    volumes:
      - mongodb_data:/data/db
    networks:
      - medconnect-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/medconnect --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Appointment Service Caching
  redis:
    image: redis:7-alpine
    container_name: medconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medconnect-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medconnect-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    networks:
      - medconnect-network
    healthcheck:
      test: echo ruok | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka for Message Streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medconnect-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server kafka:9092
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MedConnect Microservices
  # ============================================

  # Discovery Service (Eureka)
  discovery-service:
    build:
      context: .
      dockerfile: ./discovery-service/Dockerfile
    container_name: medconnect-discovery
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-service
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8761/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      zookeeper:
        condition: service_healthy

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: medconnect-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900000}
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8080/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # User Service
  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    container_name: medconnect-user
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: user-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/Medconnect_users_db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-aarabdalal@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-stjwkfrqidtectoc}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8081/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # DMP Service
  dmp-service:
    build:
      context: .
      dockerfile: ./dmp-service/Dockerfile
    container_name: medconnect-dmp
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: dmp-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mediconnect_dmp
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8083/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Prescription Service
  prescription-service:
    build:
      context: .
      dockerfile: ./prescription-service/Dockerfile
    container_name: medconnect-prescription
    ports:
      - "8084:8084"
    environment:
      SPRING_APPLICATION_NAME: prescription-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mediconnect_prescription
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8084/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Appointment Service
  appointment-service:
    build:
      context: .
      dockerfile: ./appointment-service/Dockerfile
    container_name: medconnect-appointment
    ports:
      - "8085:8085"
    environment:
      SPRING_APPLICATION_NAME: appointment-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mediconnect_appointments
      SPRING_MONGODB_URI: mongodb://mongodb:27017/mediconnect_appointments
      JAVA_TOOL_OPTIONS: -Dspring.mongodb.uri=mongodb://mongodb:27017/mediconnect_appointments -Dspring.data.mongodb.uri=mongodb://mongodb:27017/mediconnect_appointments
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8085/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    container_name: medconnect-notification
    ports:
      - "8088:8088"
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notification_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-aarabdalal@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-stjwkfrqidtectoc}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8088/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Messaging Service
  messaging-service:
    build:
      context: .
      dockerfile: ./Messaging-service/Dockerfile
    container_name: medconnect-messaging
    ports:
      - "8087:8087"
    environment:
      SPRING_APPLICATION_NAME: messaging-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/messaging_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-medconnect-super-secret-key-that-is-at-least-32-chars-long}
    depends_on:
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network
    healthcheck:
      test: curl -f http://localhost:8087/actuator/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Teleconsultation Service
  teleconsultation-service:
    build:
      context: .
      dockerfile: ./Teleconsulation/Dockerfile
    container_name: medconnect-teleconsultation
    ports:
      - "8086:8086"
    environment:
      SPRING_APPLICATION_NAME: teleconsultation-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mediconnect_teleconsultation
      SPRING_MONGODB_URI: mongodb://mongodb:27017/mediconnect_teleconsultation
      JAVA_TOOL_OPTIONS: -Dspring.mongodb.uri=mongodb://mongodb:27017/mediconnect_teleconsultation -Dspring.data.mongodb.uri=mongodb://mongodb:27017/mediconnect_teleconsultation
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - medconnect-network

networks:
  medconnect-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
