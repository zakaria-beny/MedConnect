JWT_SECRET: medconnect-super-secret-key-that-is-at-least-32-chars-long

server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive



  cloud:
    gateway:
      metrics:
        enabled: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # ✅ Block any internal endpoints from outside (FIXED PATTERN)
        - id: block-internal
          uri: no://op
          predicates:
            # ❌ was /api/**/internal/** (invalid in Spring Boot 3 / PathPatternParser)
            # ✅ valid pattern: one segment between /api and /internal
            - Path=/api/*/internal/**
          filters:
            - SetStatus=403

        # ✅ Auth / Users
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/auth/**

        - id: dmp-service
          uri: lb://dmp-service
          predicates:
            - Path=/api/dmp/**

        - id: user-service-openapi
          uri: lb://user-service
          predicates:
            - Path=/api-docs/user-service
          filters:
            - RewritePath=/api-docs/user-service, /v3/api-docs

        - id: dmp-service-openapi
          uri: lb://dmp-service
          predicates:
            - Path=/api-docs/dmp-service
          filters:
            - RewritePath=/api-docs/dmp-service, /v3/api-docs

      # ✅ CORS (Web + Mobile)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: ["Authorization", "Content-Type", "X-Requested-With"]
            exposedHeaders: ["Authorization"]
            allowCredentials: true

# ✅ Your custom config
medconnect:
  security:
    jwt-secret: ${JWT_SECRET:medconnect-super-secret-key-that-is-at-least-32-chars-long}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    urls:
      - name: user-service
        url: /api-docs/user-service
      - name: dmp-service
        url: /api-docs/dmp-service
    urlsPrimaryName: user-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99
