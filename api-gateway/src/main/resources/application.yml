server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive



  cloud:
    gateway:
      metrics:
        enabled: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # ✅ Block any internal endpoints from outside (FIXED PATTERN)
        - id: block-internal
          uri: no://op
          predicates:
            # ❌ was /api/**/internal/** (invalid in Spring Boot 3 / PathPatternParser)
            # ✅ valid pattern: one segment between /api and /internal
            - Path=/api/*/internal/**
          filters:
            - SetStatus=403

        # ✅ Auth / Users
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/auth/**

        # ✅ Events
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**

        # ✅ Reservations
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/reservations/**

        # ✅ Payments
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        # ✅ Notifications + WebSocket
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**,/ws/**

        # ✅ Reviews
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

        # ✅ Recommendations
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommendations/**

        # ✅ Transport
        - id: transport-service
          uri: lb://transport-service
          predicates:
            - Path=/api/transports/**

        # ✅ Hebergement
        - id: hebergement-service
          uri: lb://hebergement-service
          predicates:
            - Path=/api/hebergements/**

        # ✅ Itinerary (OSM / AI planner)
        - id: itinerary-service
          uri: lb://itinerary-service
          predicates:
            - Path=/api/itineraries/**

        # ✅ Assistant (chat)
        - id: assistant-service
          uri: lb://assistant-service
          predicates:
            - Path=/api/assistant/**

      # ✅ CORS (Web + Mobile)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "http://10.*.*.*:*"
              - "http://100.*.*.*:*"
              - "http://192.168.*.*:*"
              - "http://172.16.*.*:*"
              - "http://172.17.*.*:*"
              - "http://172.18.*.*:*"
              - "http://172.19.*.*:*"
              - "http://172.20.*.*:*"
              - "http://172.21.*.*:*"
              - "http://172.22.*.*:*"
              - "http://172.23.*.*:*"
              - "http://172.24.*.*:*"
              - "http://172.25.*.*:*"
              - "http://172.26.*.*:*"
              - "http://172.27.*.*:*"
              - "http://172.28.*.*:*"
              - "http://172.29.*.*:*"
              - "http://172.30.*.*:*"
              - "http://172.31.*.*:*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: "*"
            exposedHeaders: ["Authorization"]
            allowCredentials: true

# ✅ Your custom config
rihla:
  security:
    jwt-secret: ${JWT_SECRET:rihla-super-secret-key-32-chars-min-2026!!}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99
