server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive



  cloud:
    gateway:
      metrics:
        enabled: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # ✅ Block any internal endpoints from outside (FIXED PATTERN)
        - id: block-internal
          uri: no://op
          predicates:
            # ❌ was /api/**/internal/** (invalid in Spring Boot 3 / PathPatternParser)
            # ✅ valid pattern: one segment between /api and /internal
            - Path=/api/*/internal/**
          filters:
            - SetStatus=403

        # ✅ Auth / Users
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/auth/**

        - id: dmp-service
          uri: lb://dmp-service
          predicates:
            - Path=/api/dmp/**

        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**,/api/doctors/**,/api/wait-list/**,/api/agenda/**

        - id: teleconsultation-service
          uri: lb://teleconsultation-service
          predicates:
            - Path=/api/teleconsult/**

        - id: messaging-service
          uri: lb://messaging-service
          predicates:
            - Path=/api/messages/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/prescriptions/**

        - id: user-service-openapi
          uri: lb://user-service
          predicates:
            - Path=/api-docs/user-service
          filters:
            - RewritePath=/api-docs/user-service, /v3/api-docs

        - id: dmp-service-openapi
          uri: lb://dmp-service
          predicates:
            - Path=/api-docs/dmp-service
          filters:
            - RewritePath=/api-docs/dmp-service, /v3/api-docs

        - id: appointment-service-openapi
          uri: lb://appointment-service
          predicates:
            - Path=/api-docs/appointment-service
          filters:
            - RewritePath=/api-docs/appointment-service, /v3/api-docs

        - id: teleconsultation-service-openapi
          uri: lb://teleconsultation-service
          predicates:
            - Path=/api-docs/teleconsultation-service
          filters:
            - RewritePath=/api-docs/teleconsultation-service, /v3/api-docs

        - id: messaging-service-openapi
          uri: lb://messaging-service
          predicates:
            - Path=/api-docs/messaging-service
          filters:
            - RewritePath=/api-docs/messaging-service, /v3/api-docs

        - id: notification-service-openapi
          uri: lb://notification-service
          predicates:
            - Path=/api-docs/notification-service
          filters:
            - RewritePath=/api-docs/notification-service, /v3/api-docs

        - id: prescription-service-openapi
          uri: lb://prescription-service
          predicates:
            - Path=/api-docs/prescription-service
          filters:
            - RewritePath=/api-docs/prescription-service, /v3/api-docs

        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/audit/**,/api/gdpr/**,/api/compliance/**,/api/anomalies/**

        - id: audit-service-openapi
          uri: lb://audit-service
          predicates:
            - Path=/api-docs/audit-service
          filters:
            - RewritePath=/api-docs/audit-service, /v3/api-docs

      # ✅ CORS (Web + Mobile)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: ["Authorization", "Content-Type", "X-Requested-With"]
            exposedHeaders: ["Authorization"]
            allowCredentials: true

# ✅ Your custom config
medconnect:
  security:
    jwt-secret: ${JWT_SECRET:test-secret-key}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    urls:
      - name: user-service
        url: /api-docs/user-service
      - name: dmp-service
        url: /api-docs/dmp-service
      - name: appointment-service
        url: /api-docs/appointment-service
      - name: teleconsultation-service
        url: /api-docs/teleconsultation-service
      - name: messaging-service
        url: /api-docs/messaging-service
      - name: notification-service
        url: /api-docs/notification-service
      - name: audit-service
        url: /api-docs/audit-service
      - name: prescription-service
        url: /api-docs/prescription-service
    urlsPrimaryName: user-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: when_authorized

  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.90, 0.95, 0.99
