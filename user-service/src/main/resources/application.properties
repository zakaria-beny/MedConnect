spring.application.name=user-service
server.port=8081

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/Medconnect_users_db}
logging.level.org.springframework.data.mongodb=WARN
# JWT Configuration

medconnect.app.jwtSecret=${JWT_SECRET:medconnect-super-secret-key-that-is-at-least-32-chars-long}
medconnect.admin.seeding.enabled=${ADMIN_SEEDING_ENABLED:true}
medconnect.admin.email=${ADMIN_EMAIL:za.benyamna@gmail.com}
medconnect.admin.password=${ADMIN_PASSWORD:Test@12345}

medconnect.app.jwtExpirationMs=86400000
# Eureka Client Config
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
medconnect.oauth.google.client-ids=${GOOGLE_CLIENT_IDS:125460789459-uvandbuuabv8avp7se5gi7ughl50rnd6.apps.googleusercontent.com}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.90,0.95,0.99
management.metrics.distribution.slo.http.server.requests=100ms,250ms,500ms,1s
# Gmail SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:za.benyamna@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sevv qeey xvky vxvy}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
medconnect.otp.expiry-minutes=10
medconnect.auth.rate-limit.max-attempts=5
medconnect.auth.rate-limit.window-minutes=15
medconnect.auth.lockout.max-failed-attempts=5
medconnect.auth.lockout.duration-minutes=15
medconnect.auth.refresh.expiry-days=7
medconnect.mfa.totp.issuer=MedConnect
medconnect.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
medconnect.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
medconnect.twilio.from-number=${TWILIO_FROM_NUMBER:}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
medconnect.kafka.topics.user-login=user.login
medconnect.kafka.topics.user-logout=user.logout
medconnect.kafka.topics.auth-failed=auth.failed
medconnect.kafka.topics.mfa-required=mfa.required
medconnect.kafka.topics.mfa-verified=mfa.verified
medconnect.kafka.topics.user-created=user.created
medconnect.kafka.topics.user-updated=user.updated
medconnect.kafka.topics.user-suspended=user.suspended
medconnect.kafka.topics.user-deleted=user.deleted
medconnect.kafka.topics.subscription-upgraded=subscription.upgraded
medconnect.kafka.topics.subscription-downgraded=subscription.downgraded
medconnect.subscription.payment.provider=${SUBSCRIPTION_PAYMENT_PROVIDER:none}
medconnect.subscription.payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
medconnect.upload.professional-proof-dir=${PROFESSIONAL_PROOF_DIR:uploads/professional-proofs}
medconnect.upload.max-size-bytes=${PROFESSIONAL_PROOF_MAX_SIZE_BYTES:5242880}
medconnect.upload.signed-link-expiry-seconds=${PROFESSIONAL_PROOF_LINK_EXPIRY_SECONDS:600}
medconnect.upload.signed-link-secret=${PROFESSIONAL_PROOF_LINK_SECRET:}
medconnect.upload.encryption-key-base64=${PROFESSIONAL_PROOF_ENCRYPTION_KEY_BASE64:}
